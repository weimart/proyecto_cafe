# ============================================================================
# NGINX CONFIGURATION - ESENCIA Y TAZA
# Production-Ready with Performance & Security Optimizations
# ============================================================================
# Ubicación: /etc/nginx/sites-available/esenciaytaza.com
# ============================================================================

# ============================================================================
# UPSTREAM - Node.js Application Server
# ============================================================================
upstream esencia_taza_backend {
  least_conn;  # Load balancing algorithm
  server localhost:3000 weight=1 max_fails=3 fail_timeout=30s;
  server localhost:3001 weight=1 max_fails=3 fail_timeout=30s backup;
  
  keepalive 32;  # Connection pooling
}

# ============================================================================
# UPSTREAM - Cache Server (Redis - Opcional)
# ============================================================================
upstream redis_cache {
  server localhost:6379;
}

# ============================================================================
# HTTP BLOCK - Global Settings
# ============================================================================
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  
  # =========================================================================
  # LOGGING
  # =========================================================================
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';
  
  log_format json_log escape=json
    '{'
      '"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"http_referrer":"$http_referer",'
      '"http_user_agent":"$http_user_agent"'
    '}';
  
  access_log /var/log/nginx/esenciaytaza.access.log main buffer=32k flush=5s;
  error_log /var/log/nginx/esenciaytaza.error.log warn;
  
  # =========================================================================
  # PERFORMANCE
  # =========================================================================
  
  # Sendfile
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  
  # Timeouts
  client_body_timeout 12;
  client_header_timeout 12;
  keepalive_timeout 15;
  send_timeout 10;
  
  # Buffer sizes
  client_body_buffer_size 128k;
  client_max_body_size 10m;
  client_header_buffer_size 1k;
  large_client_header_buffers 4 8k;
  
  # =========================================================================
  # GZIP COMPRESSION
  # =========================================================================
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript 
             application/json application/javascript application/xml+rss 
             application/rss+xml font/truetype font/opentype 
             application/vnd.ms-fontobject image/svg+xml;
  gzip_disable "msie6";
  gzip_min_length 1000;
  gzip_http_version 1.1;
  
  # =========================================================================
  # CACHING
  # =========================================================================
  
  # Cache paths
  proxy_cache_path /var/cache/nginx/assets levels=1:2 keys_zone=assets_cache:10m 
                   max_size=100m inactive=30d use_temp_path=off;
  
  proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m 
                   max_size=50m inactive=10m use_temp_path=off;
  
  proxy_cache_path /var/cache/nginx/html levels=1:2 keys_zone=html_cache:10m 
                   max_size=30m inactive=1h use_temp_path=off;
  
  # Cache settings
  proxy_cache_key "$scheme$request_method$host$request_uri";
  proxy_cache_valid 200 10m;
  proxy_cache_valid 404 1m;
  proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
  proxy_cache_background_update on;
  proxy_cache_lock on;
  
  # =========================================================================
  # RATE LIMITING
  # =========================================================================
  
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
  
  # =========================================================================
  # REDIRECT HTTP TO HTTPS
  # =========================================================================
  server {
    listen 80;
    listen [::]:80;
    server_name esenciaytaza.com www.esenciaytaza.com;
    
    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/letsencrypt;
    }
    
    # Redirect HTTP to HTTPS
    location / {
      return 301 https://$server_name$request_uri;
    }
  }
  
  # =========================================================================
  # MAIN SERVER BLOCK - HTTPS
  # =========================================================================
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name esenciaytaza.com www.esenciaytaza.com;
    
    # Root directory
    root /var/www/esencia-y-taza/public;
    
    # =====================================================================
    # SSL/TLS CONFIGURATION
    # =====================================================================
    
    # Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/esenciaytaza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/esenciaytaza.com/privkey.pem;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/esenciaytaza.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # SSL session
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # SSL protocols & ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # HTTP Strict Transport Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # =====================================================================
    # SECURITY HEADERS
    # =====================================================================
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; 
                                       script-src 'self' 'unsafe-inline' *.gstatic.com *.googletagmanager.com; 
                                       style-src 'self' 'unsafe-inline' fonts.googleapis.com; 
                                       img-src 'self' data: https: *.cloudflare.com; 
                                       font-src 'self' fonts.gstatic.com; 
                                       connect-src 'self' analytics.google.com *.cloudflare.com; 
                                       frame-ancestors 'none';" always;
    
    # X-Frame-Options (Clickjacking protection)
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # X-Content-Type-Options (MIME sniffing protection)
    add_header X-Content-Type-Options "nosniff" always;
    
    # X-XSS-Protection (Browser XSS filter)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions-Policy (Feature Policy)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    
    # =====================================================================
    # PERFORMANCE HEADERS
    # =====================================================================
    
    # Cache control for different content types
    add_header Cache-Control "public, max-age=31536000" always ~* "^.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$";
    add_header Cache-Control "public, max-age=3600" always ~* "\.html$";
    add_header Cache-Control "public, max-age=600, must-revalidate" always ~* "^/api/";
    
    # ETag
    etag on;
    
    # Vary header for compression
    add_header Vary "Accept-Encoding" always;
    
    # =====================================================================
    # RATE LIMITING
    # =====================================================================
    limit_req zone=general_limit burst=30 nodelay;
    limit_conn conn_limit 10;
    
    # =====================================================================
    # STATIC FILES OPTIMIZATION
    # =====================================================================
    
    # Browser cache for assets
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }
    
    # Fonts caching
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      add_header Access-Control-Allow-Origin "*";
      access_log off;
    }
    
    # Images optimization
    location ~* \.(png|jpg|jpeg|gif|webp|svg)$ {
      expires 90d;
      add_header Cache-Control "public, max-age=7776000";
      access_log off;
    }
    
    # =====================================================================
    # API ROUTES
    # =====================================================================
    
    location /api/ {
      # Rate limiting for API
      limit_req zone=api_limit burst=20 nodelay;
      
      # Cache API responses (10 minutes)
      proxy_cache api_cache;
      proxy_cache_valid 200 10m;
      proxy_cache_valid 404 1m;
      add_header X-Cache-Status $upstream_cache_status;
      
      # Proxy settings
      proxy_pass http://esencia_taza_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      
      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      
      # Buffering
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
      proxy_busy_buffers_size 8k;
    }
    
    # =====================================================================
    # HTML PAGES
    # =====================================================================
    
    location / {
      # Cache HTML pages (1 hour)
      proxy_cache html_cache;
      proxy_cache_valid 200 1h;
      proxy_cache_valid 404 5m;
      add_header X-Cache-Status $upstream_cache_status;
      
      # Try files in order
      try_files $uri $uri/ @backend;
    }
    
    location @backend {
      proxy_pass http://esencia_taza_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Buffering
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
    }
    
    # =====================================================================
    # ERROR PAGES
    # =====================================================================
    
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
      root /var/www/esencia-y-taza/public;
      access_log off;
    }
    
    # =====================================================================
    # SEO & ROBOTS
    # =====================================================================
    
    location = /robots.txt {
      try_files $uri @backend;
      access_log off;
    }
    
    location = /sitemap.xml {
      try_files $uri @backend;
      access_log off;
    }
    
    # =====================================================================
    # SECURITY - DENY ACCESS
    # =====================================================================
    
    # Deny access to hidden files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }
    
    # Deny access to backup files
    location ~ ~$ {
      deny all;
      access_log off;
      log_not_found off;
    }
    
    # Deny access to specific files
    location ~ \.(env|sql|conf|lock|htaccess)$ {
      deny all;
      access_log off;
      log_not_found off;
    }
    
    # =====================================================================
    # REDIRECT WWW
    # =====================================================================
    
    if ($host = "www.esenciaytaza.com") {
      return 301 https://esenciaytaza.com$request_uri;
    }
  }
}

# ============================================================================
# NOTES FOR DEPLOYMENT
# ============================================================================
# 
# 1. Enable this config:
#    $ sudo ln -s /etc/nginx/sites-available/esenciaytaza.com /etc/nginx/sites-enabled/
#
# 2. Test syntax:
#    $ sudo nginx -t
#
# 3. Reload Nginx:
#    $ sudo systemctl reload nginx
#
# 4. Create cache directories:
#    $ sudo mkdir -p /var/cache/nginx/assets /var/cache/nginx/api /var/cache/nginx/html
#    $ sudo chown www-data:www-data /var/cache/nginx
#
# 5. Monitor logs:
#    $ sudo tail -f /var/log/nginx/esenciaytaza.access.log
#    $ sudo tail -f /var/log/nginx/esenciaytaza.error.log
#
# 6. Check performance:
#    $ curl -I https://esenciaytaza.com
#
# ============================================================================